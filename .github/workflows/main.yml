name: CI with Maven

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

# default to nothing so permissions are explicit.
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
permissions: {}

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 22
          architecture: x64
          cache: maven

      - name: Maven Validate
        run: mvn -B --settings .mvn/custom-settings.xml validate
      - name: Maven Compile
        run: mvn -B --settings .mvn/custom-settings.xml compile

      - name: Maven Test
        run: mvn -B --settings .mvn/custom-settings.xml test -Pcoverage --fail-at-end
      - name: Publish Test Report
        if: success() || failure()
        uses: scacap/action-surefire-report@v1
      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            target/site/jacoco/jacoco.xml,
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60

      - name: Maven Package
        run: mvn -B --settings .mvn/custom-settings.xml package
      - name: Maven Verify
        run: mvn -B --settings .mvn/custom-settings.xml verify

      - uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/mediatoad-1-SNAPSHOT-jar-with-dependencies.jar


  build-image:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          OCI_ARCHIVE=$(nix-build --no-out-link -A packages.x86_64-linux.ociApplicationImage)
          skopeo --insecure-policy copy --dest-creds="$DOCKER_USERNAME:$DOCKER_ACCESS_TOKEN" "docker-archive:${OCI_ARCHIVE}" "$DOCKER_REPOSITORY"
        env:
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY: ${{ github.repository }}
