name: CI with Maven

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 22
          architecture: x64
          cache: maven

      - name: Maven Validate
        run: mvn -B --settings .mvn/custom-settings.xml validate
      - name: Maven Compile
        run: mvn -B --settings .mvn/custom-settings.xml compile

      - name: Maven Test
        run: mvn -B --settings .mvn/custom-settings.xml test -Pcoverage --fail-at-end
      - name: Publish Test Report
        if: success() || failure()
        uses: scacap/action-surefire-report@v1
      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            target/site/jacoco/jacoco.xml,
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60

      - name: Maven Package
        run: mvn -B --settings .mvn/custom-settings.xml package
      - name: Maven Verify
        run: mvn -B --settings .mvn/custom-settings.xml verify

      - uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/mediatoad-1-SNAPSHOT-jar-with-dependencies.jar


  build-image:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: "Build docker image"
        run: |
          nix build .#mediatoad-docker

      - name: "Upload Docker Image"
        run: |
          CREDS="--dest-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          DEST="docker://ghcr.io/${{ github.repository }}:$(nix eval --raw .#mediatoad-docker.imageTag)"

          nix run .#mediatoad-docker.copyTo $DEST -- $CREDS
      - name: Add additional tags
        run: |
          CREDS="--src-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} --dest-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          BASE="ghcr.io/${{ github.repository }}"

          # read the tag that was just pushed from the nix derivation
          PUSHED=$(nix eval --raw .#mediatoad-docker.imageTag)

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            skopeo copy --insecure-policy $CREDS "docker://${BASE}:${PUSHED}" "docker://${BASE}:${VERSION}"
            skopeo copy --insecure-policy $CREDS "docker://${BASE}:${PUSHED}" "docker://${BASE}:latest"
          else
            SHA="$(echo $GITHUB_SHA | head -c 7)"
            skopeo copy --insecure-policy $CREDS "docker://${BASE}:${PUSHED}" "docker://${BASE}:main"
            skopeo copy --insecure-policy $CREDS "docker://${BASE}:${PUSHED}" "docker://${BASE}:sha-${SHA}"
          fi
